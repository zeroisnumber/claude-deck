<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Deck</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- 사이드바 -->
    <aside id="sidebar">
      <header id="side-head">
        <div id="brand">
          <span id="brand-mark">✻</span>
          <span id="brand-name">Claude&nbsp;Deck</span>
        </div>
        <div id="head-btns">
          <button id="btn-refresh" class="icon-btn" title="세션 목록 새로고침">⟳</button>
          <button id="btn-settings" class="icon-btn" title="설정">⚙</button>
        </div>
      </header>

      <button id="btn-new">＋ 새 세션</button>

      <div id="search-wrap">
        <input id="search" type="text" placeholder="세션 검색…" spellcheck="false" />
      </div>

      <div id="agent-filter">
        <button data-agent="all" class="af on">전체</button>
        <button data-agent="claude" class="af">Claude</button>
        <button data-agent="codex" class="af">Codex</button>
        <button data-agent="gemini" class="af">Gemini</button>
      </div>

      <nav id="session-list"></nav>

      <footer id="side-foot">
        <span id="foot-count"></span>
        <button id="btn-update" class="hidden" title="새 버전 다운로드 및 설치">업데이트</button>
      </footer>
    </aside>

    <!-- 메인 -->
    <main id="main">
      <div id="tabs"></div>

      <div id="term-area">
        <div id="empty-state">
          <div class="empty-mark">✻</div>
          <div class="empty-title">Claude Deck</div>
          <div class="empty-sub">왼쪽에서 세션을 선택하면 이 자리에서 CLI가 그대로 실행됩니다</div>
          <div class="empty-hints">
            <span><kbd>클릭</kbd> 세션 열기/전환</span>
            <span><kbd>Ctrl</kbd>+<kbd>Tab</kbd> 탭 순환</span>
            <span><kbd>Ctrl</kbd>+<kbd>V</kbd> 붙여넣기</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 새 세션 모달 -->
  <div id="modal-backdrop" class="hidden">
    <div id="modal">
      <div class="modal-title">새 세션 시작</div>
      <div class="modal-sub">에이전트를 실행할 프로젝트 폴더</div>
      <div class="modal-row">
        <input id="modal-path" type="text" value="C:\workspace\" spellcheck="false" />
        <button id="modal-browse" class="btn-ghost">찾아보기…</button>
      </div>
      <div id="recent-dirs"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-ghost">취소</button>
        <button id="modal-ok" class="btn-accent">시작</button>
      </div>
    </div>
  </div>

  <!-- 실행기 관리 모달 -->
  <div id="lmodal-backdrop" class="hidden">
    <div id="modal" class="lmodal">
      <div class="modal-title">설정</div>

      <div class="lmodal-section">에이전트 실행 명령
        <span class="lmodal-hint">세션을 열 때 실행할 명령 — ● 선택된 프로필이 사용됩니다</span>
      </div>
      <div id="profile-list"></div>
      <button id="profile-add" class="btn-ghost btn-add">＋ 프로필 추가</button>
      <div class="lmodal-note">예: <code>claude</code>, <code>headroom wrap claude</code>, <code>my-proxy run claude</code>. "재개"가 켜진 프로필은 세션 재개 시 명령 뒤에 <code>--resume &lt;세션ID&gt;</code>가 붙습니다.</div>
      <div class="modal-actions">
        <button id="lmodal-cancel" class="btn-ghost">취소</button>
        <button id="lmodal-save" class="btn-accent">저장</button>
      </div>
    </div>
  </div>

  <!-- 세션 우클릭 메뉴 / hover 미리보기 / 완료 토스트 -->
  <div id="ctx-menu" class="hidden"></div>
  <div id="preview-card" class="hidden"></div>
  <div id="toasts"></div>

  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
  <script src="main.js"></script>
</body>
</html>
